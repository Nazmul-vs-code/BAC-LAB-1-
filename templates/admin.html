<!DOCTYPE html>
<html>
<head>
    <title>Admin 👑</title>
    <style>
        body {
            background: #020617;
            color: white;
            text-align: center;
            font-family: Arial;
        }

        h2 {
            margin-top: 20px;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .card {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 15px;
            width: 260px;
            margin: 15px;
            box-shadow: 0 0 15px rgba(0,255,0,0.2);
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(0,255,0,0.5);
        }

        .title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .info {
            font-size: 14px;
            margin: 5px 0;
            color: #ccc;
        }

        button {
            margin-top: 10px;
            padding: 8px 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .delete {
            background: #ef4444;
            color: white;
        }

        .back {
            background: #22c55e;
            color: white;
            margin-top: 20px;
        }

        .flag {
            color: gold;
            font-size: 20px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<h2>👑 nope 😾🐈 PANNEL</h2>

<div class="container" id="users"></div>
<div id="flag"></div>

<audio id="win">
    <source src="https://www.soundjay.com/buttons/sounds/button-3.mp3">
</audio>

<button class="back" onclick="back()">⬅ Back to Dashboard</button>

<script>
let token = localStorage.getItem("token");
if(!token) location.href="/";

function loadUsers(){
    fetch("/api/admin/users", {
        headers: {"Authorization": "Bearer " + token}
    })
    .then(r => r.json())
    .then(data => {
        users.innerHTML = "";

        if(data.error){
            users.innerHTML = "<p>🚫 Access Denied</p>";
            return;
        }

        for(let u in data){
            let user = data[u];

            users.innerHTML += `
                <div class="card">
                    <div class="title">${u}</div>
                    <div class="info">📧 ${user.email}</div>
                    <div class="info">🔑 ${user.password}</div>
                    <div class="info">Role: ${user.role}</div>
                    <button class="delete" onclick="delUser('${u}')">Delete ❌</button>
                </div>
            `;
        }

        getFlag();
    });
}

function delUser(username){
    fetch("/api/admin/delete/" + username, {
        method: "POST",
        headers: {"Authorization": "Bearer " + token}
    })
    .then(res => res.json())
    .then(data => {
        if(data.success){
            loadUsers();
            document.getElementById("win").play();
        }
    });
}

function getFlag(){
    fetch("/api/admin/flag", {
        headers: {"Authorization": "Bearer " + token}
    })
    .then(r => r.json())
    .then(d => {
        if(d.flag){
            flag.innerHTML = `<div class="flag">${d.flag}</div>`;
        }
    });
}

function back(){
    location.href = "/dashboard";
}

loadUsers();
</script>

</body>
</html>
